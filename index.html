---
layout: default
title: 首页
---

<h1>{{ site.title }}</h1>
<p>{{ site.tagline }}</p>

<div>
  <h2>最新文章</h2>
  {% for post in site.posts limit:5 %}
    <article>
      <h3><a href="{{ post.url | relative_url }}">{{ post.title }}</a></h3>
      <time>{{ post.date | date: "%Y年%m月%d日" }}</time>
    </article>
  {% endfor %}
</div>
